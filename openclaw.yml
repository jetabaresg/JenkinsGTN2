Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: 'true'
      EnableDnsHostnames: 'true'
      Tags:
        - Key: name
          Value: vpc-trabajo

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  # ─── Security Groups ────────────────────────────────────────────────────────

  GrupoSeguridadOpenClaw:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Grupo de Seguridad de OpenClaw
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 18987
          ToPort: 18987
          CidrIp: 0.0.0.0/0

  # FIX #1: Security Group para Apache que faltaba por completo
  GrupoSeguridadApache:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Grupo de Seguridad de Apache
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0

  # ─── Instancias ──────────────────────────────────────────────────────────────

  instanciaOpenClaw:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0ec10929233384c7f
      InstanceType: t2.micro
      KeyName: openclaw
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref GrupoSeguridadOpenClaw
      Tags:
        - Key: Name
          Value: instanciaOpenClaw
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Actualizar el sistema
          apt-get update -y
          apt-get upgrade -y

          # FIX #2: -y en todos los apt install para evitar prompts interactivos
          # Instalar dependencias para Docker
          apt-get install -y ca-certificates curl

          # Agregar clave GPG oficial de Docker
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc

          # Agregar repositorio de Docker
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          apt-get update -y

          # FIX #2: -y agregado
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

          systemctl start docker
          systemctl enable docker

          # FIX #3: heredoc en lugar de echo para evitar problemas de indentación en el YAML
          cat <<'COMPOSE' > /root/docker-compose.yml
          version: '3.8'
          services:
            web:
              image: ghcr.io/openclaw/openclaw:latest
              container_name: openclaw
              ports:
                - '18987:18987'
              restart: unless-stopped
          COMPOSE

          # FIX #4: "unless.stopped" → "unless-stopped" (corregido arriba en el heredoc)

          cd /root
          docker compose up -d

  instanciaApache:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-04b4f1a9cf54c11d0
      InstanceType: t2.micro
      KeyName: prueba
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref GrupoSeguridadApache   # FIX #1: ahora el SG existe
      Tags:
        - Key: Name
          Value: instanciaApache
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          apt-get update -y
          apt-get upgrade -y

          # FIX #2: -y en todos los apt install
          apt-get install -y apt-transport-https ca-certificates curl software-properties-common git

          # Instalar Docker
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
          add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
          apt-get update -y
          apt-get install -y docker-ce docker-ce-cli containerd.io

          systemctl start docker
          systemctl enable docker

          # FIX #5: UserData de Apache completado — clonar repo y levantar compose
          git clone https://github.com/cesarpalacios/JenkinsGTN.git /opt/JenkinsGTN
          cd /opt/JenkinsGTN

          # Levantar el stack si hay un docker-compose.yml en el repo
          docker compose up -d
            docker compose up -d 
            sudo apt-get install openjdk-17-jre -y
