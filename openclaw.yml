Resources:
    VPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsSupport: true
        EnableDnsHostnames: true
        Tags:
        - Key: name
          Value: vpc-trabajo

    InternetGateway:
      Type: AWS::EC2::InternetGateway

    AttachGateway:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref VPC
        InternetGatewayId: !Ref InternetGateway

    RouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref VPC

    Route:
      Type: AWS::EC2::Route
      DependsOn: AttachGateway
      Properties:
        RouteTableId: !Ref RouteTable
        DestinationCidrBlock: 0.0.0.0/0
        GatewayId: !Ref InternetGateway

    Subnet:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        CidrBlock: 10.0.1.0/24
        MapPublicIpOnLaunch: true

    SubnetRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref Subnet
        RouteTableId: !Ref RouteTable

    GrupoSeguridadOpenclaw:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Grupo de Seguridad de OpenClaw
        VpcId: !Ref VPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
          - IpProtocol: tcp
            FromPort: 18987
            ToPort: 18987
            CidrIp: 0.0.0.0/0

    instanciaOpenclaw:
      Type: AWS::EC2::Instance
      Properties:
        ImageId: ami-091138d0f0d41ff90
        InstanceType: t3a.medium
        KeyName: openclaw
        SubnetId: !Ref Subnet
        SecurityGroupIds:
          - !Ref GrupoSeguridadOpenclaw
        Tags:
          - Key: Name
            Value: instanciaOpenclaw

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # Log de salida para depurar (puedes verlo en /var/log/user-data.log)
            exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1

            apt-get update
            apt-get upgrade -y
            apt-get install -y ca-certificates curl gnupg

            # Instalación de Docker (Método simplificado y más robusto para scripts)
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg

            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
              tee /etc/apt/sources.list.d/docker.list > /dev/null

            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

            # Crear directorio de trabajo
            mkdir -p /home/ubuntu/openclaw
            cd /home/ubuntu/openclaw

            # Crear el docker-compose.yml
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              web:
                image: ghcr.io/openclaw/openclaw:latest
                container_name: openclaw
                ports:
                  - '18987:18987'
                restart: unless-stopped
            EOF

            # Iniciar Docker y levantar el servicio
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo docker compose up -d
