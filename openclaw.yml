Resources:
    VPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsSupport: 'true'
        EnableDnsHostnames: 'true'
        Tags:
        - Key: name
          Value: vpc-trabajo

    InternetGateway:
      Type: AWS::EC2::InternetGateway

    AttachGateway:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref VPC
        InternetGatewayId: !Ref InternetGateway

    RouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref VPC

    Route:
      Type: AWS::EC2::Route
      DependsOn: AttachGateway
      Properties:
        RouteTableId: !Ref RouteTable
        DestinationCidrBlock: 0.0.0.0/0
        GatewayId: !Ref InternetGateway

    Subnet:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref VPC
        CidrBlock: 10.0.1.0/24
        MapPublicIpOnLaunch: true

    SubnetRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref Subnet
        RouteTableId: !Ref RouteTable

    GrupoSeguridadOpenClaw:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Grupo de Seguridad de OpenClaw
        VpcId: !Ref VPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
          - IpProtocol: tcp
            FromPort: 18987
            ToPort: 18987
            CidrIp: 0.0.0.0/0

    instanciaOpenClaw:
      Type: AWS::EC2::Instance
      Properties:
        ImageId: ami-0ec10929233384c7f
        InstanceType: t2.micro
        KeyName: openclaw
        SubnetId: !Ref Subnet
        SecurityGroupIds:
          - !Ref GrupoSeguridadOpenClaw
        Tags:
          - Key: Name
            Value: instanciaOpenClaw

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            #!/bin/bash
            # Actualizar el sistema
            sudo apt-get update -y
            sudo apt-get upgrade -y

            # Add Docker's official GPG key:
            sudo apt install ca-certificates curl
            sudo install -m 0755 -d /etc/apt/keyrings
            sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            sudo chmod a+r /etc/apt/keyrings/docker.asc
            
            # Add the repository to Apt sources:
            sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
            Types: deb
            URIs: https://download.docker.com/linux/ubuntu
            Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
            Components: stable
            Architectures: $(dpkg --print-architecture)
            Signed-By: /etc/apt/keyrings/docker.asc
            EOF
            
            sudo apt update

            sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

            echo "version: '3.8'
                  services:
                    web:
                      image: ghcr.io/openclaw/openclaw:latest
                      container_name: openclaw
                      ports:
                        - '18987:18987'
                      restart: unless.stopped" > docker-compose.yml

            sudo systemctl start docker

            sudo docker run hello-world

            sudo docker compose up -d

            # # Instalar dependencias necesarias
            # sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common fontconfig openjdk-17-jre

            # # Agregar la clave GPG y el repositorio de Jenkins
            # curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | sudo gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg
            # echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/" | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

            # # Actualizar e instalar Jenkins
            # sudo apt-get update -y
            # sudo apt-get install -y jenkins

            # # Iniciar y habilitar el servicio de Jenkins
            # sudo systemctl start jenkins
            # sudo systemctl enable jenkins

    instanciaApache:
     Type: AWS::EC2::Instance
     Properties: 
        ImageId: ami-04b4f1a9cf54c11d0
        InstanceType: t2.micro
        KeyName: prueba
        SubnetId: !Ref Subnet
        SecurityGroupIds:
          - !Ref GrupoSeguridadApache
        Tags:
          - Key: Name
            Value: instanciaApache

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            apt-get update -y
            apt-get upgrade -y
            apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
            sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
            sudo apt-get update -y
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            sudo systemctl start docker
            sudo systemctl enable docker
            git clone https://github.com/cesarpalacios/JenkinsGTN.git
            cd JenkinsGTN
            docker compose up -d 
            sudo apt-get install openjdk-17-jre -y
